
encoder:
  dim: 384
  depth: 12
  heads: 6
  patch_size: 14
  resolution: 224
  n_registers: 1

data:
  data_root: data/imagenette2-320/train
  val_root: data/imagenette2-320/val
  photometric: true
  resolution: 224
  batch_size: 256
  num_workers: 12

training:
  project: spectral-jepa
  seed: 42
  loss: mse
  distributed: true
  warmup_steps: 2000
  total_steps: 100000
  cooldown_frac: 0.2
  lambda: 0.04
  optimizer: muon
  lr_start: 1e-4
  lr: 4e-4
  final_lr_frac: 0.1
  wd: 4e-2
  clip_grad: 10.0
  val_fraction: 0.01
  ckpt_fraction: 0.5
  # wandb: disabled
