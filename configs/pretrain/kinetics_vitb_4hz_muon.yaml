registers: 4
transform_dim: 128
beta: 1e-2
gamma: 1e-2
transform_type: continuous
n_transforms: 256

encoder:
  dim: 768
  depth: 12
  heads: 12
  patch_size: 14

predictor:
  dim: 768
  depth: 12
  heads: 12

data:
  data_root: /scratch/local/train
  val_root: /scratch/local/val
  sequence_length: 8
  photometric: true
  stride: 1
  step: 1
  resolution: 224
  num_threads: 12
  batch_size: 36

training:
  seed: 42
  distributed: true
  warmup_steps: 12000
  total_steps: 90000
  optimizer: muon
  lr_start: 5e-4
  lr: 2e-3
  lr_end: 1e-6
  wd: 0.04
  wd_end: 0.4
  clip_grad: 10.0
  val_fraction: 0.05
  # wandb: disabled
