# @package _global_
encoder:
  arch: vit-s
  patch_size: 12
  resolution: 96
  n_registers: 1
  projector: false

predictor:
  arch: vit-s
  fsq_levels: null
  context: 6
  projector: false

action_decoder:
  enabled: true
  action_dim: 4
  action_type: continuous
  depth: 2
  heads: 8

data:
  kind: toy_env
  train_path: data/toy_envs/push_train.h5
  val_path: data/toy_envs/push_val.h5
  include_actions: true
  photometric: false
  crop: false
  sequence_length: 6
  batch_size: 128
  num_workers: 8

training:
  project: jepa
  seed: 42
  warmup_steps: 1000
  total_steps: 50000
  lambda: 0.01
  optimizer: muon
  lr_start: 1e-4
  lr: 3e-4
  cooldown_frac: 0.2
  final_lr_frac: 0.1
  wd: 0.04
  clip_grad: 10.0
  val_fraction: 0.05
  ckpt_fraction: 0.25
  # wandb: disabled
