# @package _global_
encoder:
  arch: convnext-t
  # arch: vit-s
  # patch_size: 12
  resolution: 96
  # n_registers: 1
  # projector: true
  # projector_norm: bn

predictor:
  mode: residual
  arch: vit-s
  fsq_levels: [8,8,8]
  context: 128

action_decoder:
  enabled: true
  action_dim: 17
  action_type: discrete
  depth: 2
  heads: 8

data:
  kind: craftax_online
  sequence_length: 32
  batch_size: 32
  buffer_size: 32
  frame_size: [96, 96]
  include_actions: true
  photometric: per_frame
  crop: true

training:
  project: jepa
  seed: 42
  distributed: false
  warmup_steps: 1000
  total_steps: 100000
  lambda: 0.1
  # sigreg_marginal: full
  optimizer: muon
  lr_start: 1e-4
  lr: 3e-4
  cooldown_frac: 0.2
  final_lr_frac: 0.1
  wd: 0.04
  clip_grad: 10.0
  val_fraction: 0.05
  ckpt_fraction: 0.25
  # wandb: disabled
